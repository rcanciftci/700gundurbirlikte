<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>700 Günde Neler Yaptık?</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      background: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .hero {
      text-align: center;
      margin-bottom: 72px;
    }

    .hero-logo {
      width: 360px;
      height: auto;
      margin-bottom: 24px;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }

    .hero h1 {
      font-size: clamp(36px, 6vw, 72px);
      font-weight: 700;
      letter-spacing: -0.03em;
      color: #1d1d1f;
      line-height: 1.1;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(2, 340px);
      gap: 24px;
    }

    .card {
      width: 340px;
      height: 420px;
      border-radius: 28px;
      background: #f5f5f7;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: flex-end;
      padding: 40px;
      cursor: pointer;
      transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                  box-shadow 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 28px;
      background: linear-gradient(
        160deg,
        rgba(255, 255, 255, 0.6) 0%,
        rgba(255, 255, 255, 0) 60%
      );
      pointer-events: none;
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.10);
    }

    .card-icon {
      position: absolute;
      top: 40px;
      left: 40px;
      width: 52px;
      height: 52px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card--hizmetler .card-icon {
      background: linear-gradient(145deg, #0071e3, #42a5f5);
    }

    .card--acilislar .card-icon {
      background: linear-gradient(145deg, #1d1d1f, #6e6e73);
    }

    .card--vaatler .card-icon {
      background: linear-gradient(145deg, #34c759, #30d158);
    }

    .card--butce .card-icon {
      background: linear-gradient(145deg, #ff9f0a, #ffcc00);
    }

    .card-icon svg {
      width: 26px;
      height: 26px;
      fill: #fff;
    }

    .card-label {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #6e6e73;
      margin-bottom: 10px;
    }

    .card-title {
      font-size: 38px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #1d1d1f;
      line-height: 1.1;
    }

    .card--hizmetler .card-title {
      color: #0071e3;
    }

    .card--acilislar .card-title {
      color: #1d1d1f;
    }

    .card--vaatler .card-title {
      color: #1d8e3a;
    }

    .card--butce .card-title {
      color: #b36200;
    }

    @media (max-width: 740px) {
      .cards {
        grid-template-columns: 1fr;
        justify-items: center;
      }

      .card {
        width: 90vw;
        height: 260px;
      }

      .hero {
        margin-bottom: 48px;
        padding: 0 24px;
      }
    }
  
    /* ── SOCIAL FOOTER ── */
    .social-footer {
      border-top: 1px solid rgba(0,0,0,0.08);
      padding: 40px 24px 52px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }
    .social-footer-label {
      font-size: 11px;
      font-weight: 600;
      color: #aeaeb2;
      letter-spacing: .1em;
      text-transform: uppercase;
    }
    .social-links {
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .social-link {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: #f5f5f7;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: #3a3a3c;
      transition: background .18s, transform .18s;
    }
    .social-link:hover {
      background: #e5e5ea;
      transform: translateY(-2px);
    }
    .social-link svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }
  </style>
